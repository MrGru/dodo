# Continuous integration: everything that must be true of a commit before it
# reaches `main`, and nothing that takes longer than a coffee.
#
# Layout of the pipeline:
#
#   fmt ─┐
#   clippy ─┼─ fast feedback, single runner each
#   test ─┘
#   check ── one `cargo check` per shipped platform: does it still compile there?
#   build-debug ── one real, linkable binary on the primary platform
#
# The jobs are independent on purpose: a formatting mistake should not hide a
# compile error on Windows. `analysis.yml` runs the slow, advisory tooling
# (bloat, audit, deny) on its own schedule so CI stays interactive.
#
# WHY THERE IS NO `--release` BUILD HERE ANY MORE, AND WHAT THAT COSTS.
# This workflow used to run `cargo build --release --locked` on all four
# platforms on every push. That is the most expensive configuration this
# project has — fat LTO plus `codegen-units = 1` over ~800 crates, on the
# highest-billing runners — for a signal that is almost never profile
# dependent. The evidence: the one real Windows failure so far (run
# 30106478178) was a plain missing-function type error, which `cargo check`
# catches identically and in a fraction of the time.
#
# So the per-push path is now: `cargo check` per platform (catches portability
# breaks) plus one debug build on macOS arm64 (proves the binary still links
# and runs). The full four-platform release matrix moved to
# `.github/workflows/release-profile.yml` — weekly and on demand — and to
# `release.yml`, which already does it for real on a tag.
#
# ACCEPTED TRADE-OFF, stated plainly so nobody rediscovers it in an incident:
# a failure that only appears under the release profile — an LTO miscompile or
# ICE, a bad linker flag, `strip` misbehaving on one platform, a `debug_assertions`
# difference — will NOT be caught on the push that introduces it. It surfaces on
# the next weekly `release-profile` run, on a manual dispatch, or at tag time.
# If you are about to tag, run `release-profile.yml` (or `release.yml` with
# `dry_run: true`) first rather than discovering it during the release.
#
# HONESTY NOTE, please keep it accurate: this repository is developed on macOS
# arm64. These workflows have now run for real (first run: 30106478178) —
# `test`, `build (macos-arm64)` and `build (linux-x64)` passed,
# `build (windows-x64)` failed. So `linux-x64` is green once and could have its
# `experimental` flag flipped; that is a deliberate call, not a formality.
# Every other job that says `experimental` is still written-but-unverified.
# The `check` matrix inherits those flags unchanged: a `cargo check` is strictly
# weaker than the `cargo build --release` those runs performed, so nothing about
# the evidence changed when the jobs did. `check (macos-arm64)` and `build-debug`
# have never run in this shape either — only their release-profile ancestors have.
#
# That Windows failure was one compile error — `Docker::connect_with_podman_
# defaults` is `#[cfg(unix)]` in bollard — and `docker::services::engine::connect`
# is now `#[cfg]`-split per platform. The fix was verified by cross-compiling that
# connector chain for `x86_64-pc-windows-msvc` on macOS; the full app could not be
# cross-checked (`aws-lc-sys` needs the Windows SDK headers), so whether
# `build (windows-x64)` now goes green is still unproven until CI says so.

name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# One run per branch. A new push to a PR cancels the previous run — nobody
# needs the results of a superseded commit — but pushes to `main` are never
# cancelled, because their results are what release decisions are based on.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------------------
  # Formatting. Cheap enough to run on ubuntu even though nothing else does:
  # rustfmt parses, it does not compile, so it needs no GPUI system libraries.
  # ---------------------------------------------------------------------------
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    # BLOCKING. This job shipped advisory because 34 files predated
    # `.rustfmt.toml`; they were reformatted wholesale in a `style:` commit, so
    # the tree is clean and any new diff is a real regression. Do not re-add
    # `continue-on-error` — run `cargo fmt --all` instead.
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          components: rustfmt
          cache-key: fmt
          # Nothing is compiled here, so there is no cache worth saving.
          save-cache: "false"
      - run: cargo fmt --all --check

  # ---------------------------------------------------------------------------
  # Lints. Runs on macOS because that is the only platform dodo is known to
  # compile on; clippy has to build the whole dependency graph, so a job on an
  # unverified platform would fail for reasons that are not lint findings.
  # ---------------------------------------------------------------------------
  clippy:
    name: clippy
    runs-on: macos-15
    # BLOCKING, for the same reason as `fmt`: the 12 warnings that predated this
    # workflow (collapsible_if, unnecessary_sort_by, redundant_closure and
    # friends, in `src/docker/` and `src/encoder_decoder.rs`) were cleared in
    # their own commit. The two that survive are `#[allow]`ed at their
    # definition with the reason written next to them; there is no crate-level
    # allow, so a new warning fails the build. Keep it that way.
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          components: clippy
          cache-key: clippy
      # `--all-targets` covers the test harness too. `--locked` everywhere: see
      # the note in .cargo/config.toml about Cargo.lock being the only pin on
      # the git dependencies.
      - run: cargo clippy --all-targets --locked -- -D warnings

  # ---------------------------------------------------------------------------
  # Tests. dodo's suite is the i18n guards (src/i18n.rs, src/i18n_lint.rs), the
  # pure model logic under api_explorer/ and docker/, and the build-metadata
  # checks in src/build_info.rs. None of them opens a window, so a headless
  # runner is fine.
  # ---------------------------------------------------------------------------
  test:
    name: test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
        with:
          cache-key: test
      - run: cargo test --locked --all-features

      # The default feature set is what ships; the empty one is what makes the
      # `syntax-highlighting` feature meaningful. Checking (not building) is
      # enough to catch a `cfg` that only compiles one way, and costs a
      # fraction of a full build.
      - name: cargo check --no-default-features
        run: cargo check --locked --no-default-features

  # ---------------------------------------------------------------------------
  # Portability, once per shipped platform. `cargo check` type-checks the whole
  # crate graph for the target without codegen or linking, which is exactly the
  # class of breakage a cross-platform matrix exists to find: a function that is
  # `#[cfg(unix)]` in a dependency, a path type that differs, a `cfg` arm that
  # never compiled. Each row runs natively on its own platform — a cross-check
  # from macOS is not equivalent and does not work here anyway (`aws-lc-sys`
  # needs the Windows SDK headers; see docs/release.md).
  #
  # What this does NOT do is produce a binary or run the linker. That is
  # `build-debug` below, on the primary platform.
  # ---------------------------------------------------------------------------
  check:
    name: check (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    # Unverified platforms must not block a merge. Flip `experimental` to false
    # per row once that row has passed on a real runner.
    continue-on-error: ${{ matrix.experimental }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-arm64
            os: macos-15
            target: aarch64-apple-darwin
            experimental: false
          - name: macos-x64
            os: macos-15-intel
            target: x86_64-apple-darwin
            experimental: true
          - name: linux-x64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            experimental: true
          - name: windows-x64
            os: windows-2022
            target: x86_64-pc-windows-msvc
            experimental: true
    steps:
      - uses: actions/checkout@v4

      # Still required on Linux: `cargo check` does not link, but the -sys
      # crates in this graph run build scripts that call pkg-config and compile
      # C, so the headers have to be there. `lld` is not — nothing is linked —
      # so the linker install and the RUSTFLAGS it sets are skipped.
      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        uses: ./.github/actions/linux-build-deps
        with:
          lld: "false"

      - uses: ./.github/actions/setup-rust
        with:
          targets: ${{ matrix.target }}
          # A namespace of its own: check artifacts (rmeta, no object code) are
          # not interchangeable with the release matrix's, and must not evict it.
          cache-key: check-${{ matrix.target }}

      - name: cargo check
        run: cargo check --locked --all-features --target ${{ matrix.target }}

  # ---------------------------------------------------------------------------
  # One real binary per push, on the one platform dodo is known to work on.
  #
  # Debug, not release: the point is that the crate still links and the result
  # still executes, and the debug profile establishes both for a fraction of the
  # cost (no fat LTO, no `codegen-units = 1`). The release profile's own risks
  # are covered by release-profile.yml — see the trade-off note at the top.
  # ---------------------------------------------------------------------------
  build-debug:
    name: build (macos-arm64, debug)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-rust
        with:
          cache-key: build-debug

      - name: cargo build
        run: cargo build --locked

      # Prove the artifact executes. dodo is a GUI app and a runner has no
      # display, so `--build-info` — which returns before any window code runs —
      # is the strongest launch check CI can make. It does establish that the
      # binary is valid for the platform, that its dynamic libraries resolve,
      # and that build.rs embedded real metadata.
      - name: Smoke test the binary
        shell: bash
        run: ./target/debug/dodo --build-info
